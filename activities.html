<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bucky Board Activities - What's happening around UW-Madison campus today.">
    <title>Activities - Bucky Board</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='6' fill='%238B0000'/><text x='12' y='17.5' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='16' fill='white'>B</text></svg>">
    <style>
      :root{--s50:#f8fafc;--s100:#f1f5f9;--s200:#e2e8f0;--s300:#cbd5e1;--s400:#94a3b8;--s500:#64748b;--s600:#475569;--s700:#334155;--s800:#1e293b;--s900:#0f172a;--r700:#8b0000;--r800:#6b0000;--r50:#fdf2f2;--w:#fff}
      *{box-sizing:border-box;margin:0;padding:0}html{height:100%;scroll-behavior:smooth}
      body{font-family:GentiumBookW,Georgia,serif;background:#FAF7F2;color:var(--s900);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
      @font-face{font-family:GentiumBookW;font-weight:400;src:url(GentiumBook-Regular.woff2)}
      @font-face{font-family:GentiumBookW;font-weight:700;src:url(GentiumBook-Bold.woff2)}
      @font-face{font-family:GentiumBookW;font-weight:400;font-style:italic;src:url(GentiumBook-Italic.woff2)}
      @font-face{font-family:GentiumBookW;font-weight:700;font-style:italic;src:url(GentiumBook-BoldItalic.woff2)}
      ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s300);border-radius:10px}
      a{text-decoration:none;color:inherit}img{display:block}
      .hdr{background:var(--w);border-bottom:1px solid var(--s200);position:sticky;top:0;z-index:50}
      .hdr-in{max-width:72rem;margin:0 auto;display:flex;height:4.5rem;align-items:center;justify-content:space-between;padding:0 1.5rem}
      .logo{display:flex;align-items:center;gap:0.75rem}
      .logo-mark{width:2rem;height:2rem;background:var(--r700);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-family:GentiumBookW,Georgia,serif;font-weight:700;font-size:1.125rem;color:var(--w);box-shadow:0 1px 2px rgba(0,0,0,0.1)}
      .logo-text{color:var(--r700);font-weight:700;font-size:1.25rem;letter-spacing:-0.02em}
      .nav{display:flex;align-items:center;gap:0.25rem}
      .nav a{padding:0.5rem 0.875rem;border-radius:9999px;font-size:0.8125rem;font-weight:600;color:var(--s500);transition:all 0.2s}
      .nav a:hover{color:var(--s800);background:var(--s50)}
      .nav a.active{color:var(--r700);background:var(--r50)}
      .ftr{background:#FAF7F2;color:var(--s500);padding:1.5rem;border-top:1px solid var(--s200);margin-top:auto}
      .ftr-in{max-width:64rem;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem}
      .ftr p{font-size:0.875rem}
      .ftr-links{display:flex;gap:1.5rem}.ftr-links a{font-size:0.8125rem;color:var(--s400);transition:color 0.2s}.ftr-links a:hover{color:var(--r700)}

      .page{flex:1;background:#FAF7F2}
      .content{max-width:72rem;margin:0 auto;padding:2rem 1.5rem}

      /* TITLE */
      .pg-title{text-align:center;margin-bottom:2rem}
      .pg-title h1{font-size:2rem;font-weight:700;color:var(--s900);letter-spacing:-0.02em}
      .pg-title p{font-size:1rem;color:var(--s500);max-width:36rem;margin:0.5rem auto 0}

      /* ── EDITORIAL FILTER TAB BAR ── */
      .filter-bar-wrap{
        position:sticky;top:4.5rem;z-index:40;
        background:#fff;
        border-bottom:1px solid var(--s200);
        margin:-0.5rem -1.5rem 2rem;
        padding:0 1.5rem;
      }
      .filter-bar{
        display:flex;align-items:stretch;
        overflow-x:auto;-webkit-overflow-scrolling:touch;
        scrollbar-width:none;position:relative;
      }
      .filter-bar::-webkit-scrollbar{display:none}
      .src-tab{
        display:flex;flex-direction:column;align-items:center;
        padding:1rem 1.125rem 0.875rem;
        border:none;background:transparent;cursor:pointer;
        font-family:inherit;white-space:nowrap;
        position:relative;flex-shrink:0;
        outline:none;
      }
      .src-tab-label{
        font-size:0.8125rem;font-weight:700;letter-spacing:-0.01em;
        color:var(--s600);transition:color 0.22s;
      }
      .src-tab-sub{
        font-size:0.5625rem;font-weight:700;letter-spacing:0.07em;
        text-transform:uppercase;color:var(--s400);
        margin-top:0.2rem;transition:color 0.22s;
      }
      .src-tab.active .src-tab-label{color:#000}
      .src-tab.active .src-tab-sub{color:var(--s500)}
      .src-tab:hover:not(.active) .src-tab-label{color:#000}
      .src-tab:hover:not(.active) .src-tab-sub{color:var(--s500)}
      .src-tab::after{
        content:'';position:absolute;bottom:0;left:50%;
        width:0;height:2px;background:var(--r700);
        transform:translateX(-50%);
        transition:width 0.3s cubic-bezier(0.4,0,0.2,1);
        border-radius:2px 2px 0 0;
      }
      .src-tab.active::after{width:calc(100% - 1.5rem)}

      /* ── EXPLORE PORTALS ── */
      .explore{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:2rem}
      @media(max-width:480px){.explore{grid-template-columns:1fr}}
      .explore-card{
        position:relative;overflow:hidden;
        background:var(--w);border:1px solid var(--s200);border-radius:1rem;
        padding:1.25rem 1.375rem 1.125rem;
        display:flex;flex-direction:column;justify-content:space-between;
        min-height:6.5rem;
        transition:transform 0.25s cubic-bezier(0.4,0,0.2,1),box-shadow 0.25s,border-color 0.25s;
        text-decoration:none;
      }
      .explore-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.07);border-color:var(--s300)}
      .explore-name{
        font-size:1rem;font-weight:700;color:var(--s900);
        letter-spacing:-0.01em;line-height:1.25;
      }
      .explore-arrow{
        align-self:flex-start;margin-top:1rem;
        display:flex;align-items:center;gap:0.375rem;
        font-size:0.6875rem;font-weight:700;letter-spacing:0.06em;
        text-transform:uppercase;color:var(--r700);
        transition:gap 0.2s;
      }
      .explore-card:hover .explore-arrow{gap:0.5rem}

      /* EVENTS */
      .events-loading{text-align:center;padding:4rem 1rem;color:var(--s400)}
      .events-loading .spin{display:inline-block;width:2rem;height:2rem;border:3px solid var(--s200);border-top-color:var(--r700);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem}
      @keyframes spin{to{transform:rotate(360deg)}}
      .events-error{text-align:center;padding:3rem 1rem;background:var(--w);border:1px solid var(--s200);border-radius:1.25rem}
      .events-error p{color:var(--s500);margin-bottom:1rem}
      .events-error a{color:var(--r700);font-weight:700}

      .ev-list{display:flex;flex-direction:column;gap:1rem}
      .ev{background:var(--w);border:1px solid var(--s200);border-radius:1rem;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
      .ev:hover{border-color:var(--s300);box-shadow:0 8px 24px rgba(0,0,0,0.05);transform:translateY(-2px)}
      .ev-inner{display:flex}
      .ev-date-col{width:5rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 0.5rem;background:var(--s50);border-right:1px solid var(--s200)}
      .ev-date-month{font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--r700)}
      .ev-date-day{font-size:1.75rem;font-weight:700;color:var(--s900);line-height:1;margin-top:0.125rem}
      .ev-date-dow{font-size:0.6875rem;color:var(--s400);font-weight:500;margin-top:0.25rem}
      .ev-body{flex:1;padding:1.25rem 1.5rem;min-width:0}
      .ev-title{font-size:1.0625rem;font-weight:700;color:var(--s900);margin-bottom:0.375rem;line-height:1.35}
      .ev-meta{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:0.625rem}
      .ev-meta-item{display:flex;align-items:center;gap:0.375rem;font-size:0.8125rem;color:var(--s500);font-weight:500}
      .ev-meta-item svg{flex-shrink:0;color:var(--s400)}
      .ev-desc{font-size:0.875rem;color:var(--s500);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer}
      .ev-desc.expanded{display:block !important;-webkit-line-clamp:unset !important;-webkit-box-orient:initial !important;overflow:visible !important}
      .ev-cost{background:var(--s100);color:var(--s700);padding:0.125rem 0.5rem;border-radius:9999px;font-size:0.75rem;font-weight:700;letter-spacing:0.01em}
      .ev-link{display:inline-flex;align-items:center;gap:0.375rem;font-size:0.8125rem;font-weight:700;color:var(--r700);margin-top:0.75rem;transition:gap 0.2s}
      .ev:hover .ev-link{gap:0.625rem}
      @media(max-width:640px){.ev-date-col{width:4rem;padding:1rem 0.25rem}.ev-date-day{font-size:1.5rem}.ev-body{padding:1rem 1.25rem}}

      .sl-btn-outline:disabled{opacity:0.55;cursor:not-allowed}
      .icon-spin{animation:spin 1s linear infinite}

      /* FORM MODAL — matches uwbulletinboard */
      @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      .anim-spin{animation:spin 1s linear infinite}
      .anim-fade-in{animation:fadeIn 0.5s ease forwards}
      .modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem}
      @media(min-width:640px){.modal-overlay{padding:1.5rem}}
      .modal-backdrop{position:absolute;inset:0;background:rgba(15,23,42,0.2);backdrop-filter:blur(8px)}
      .form-modal-box{position:relative;background:#0f172a;border:1px solid #334155;width:100%;max-width:56rem;height:90vh;border-radius:1.25rem;box-shadow:0 25px 50px rgba(0,0,0,0.25);display:flex;flex-direction:column;overflow:hidden}
      .form-modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid #1e293b;background:#0f172a}
      .form-modal-header h3{font-size:1.125rem;font-weight:600;color:#fff}
      .form-modal-header-actions{display:flex;align-items:center;gap:1rem}
      .form-modal-header a{color:#94a3b8;font-size:0.875rem;display:flex;align-items:center;gap:0.25rem;transition:color 0.2s;text-decoration:none}
      .form-modal-header a:hover{color:#c04040}
      .form-modal-header button{padding:0.25rem;border-radius:9999px;color:#94a3b8;transition:all 0.2s;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
      .form-modal-header button:hover{background:#1e293b;color:#fff}
      .form-modal-msg{background:rgba(254,243,199,0.1);border-bottom:1px solid rgba(245,158,11,0.2);padding:1rem;display:flex;gap:0.75rem;color:#fef3c7;font-size:0.875rem}
      .form-modal-msg svg{flex-shrink:0;color:#fbbf24}
      .form-modal-body{flex:1;background:#fff}
      .form-modal-body iframe{width:100%;height:100%;border:0}

      /* ACTION BUTTONS — matches uwbulletinboard */
      .sl-actions{display:flex;justify-content:center;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
      .sl-btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;font-size:0.875rem;font-weight:600;border-radius:9999px;transition:all 0.2s;font-family:inherit;cursor:pointer;border:none}
      .sl-btn svg{flex-shrink:0}
      .sl-btn-outline{color:var(--s600);background:var(--w);border:1px solid var(--s200);box-shadow:0 1px 2px rgba(0,0,0,0.05)}
      .sl-btn-outline:hover:not(:disabled){background:var(--s50)}
      .sl-btn-outline:disabled{opacity:0.55;cursor:not-allowed}
      .sl-btn-primary{color:var(--w);background:var(--r700);box-shadow:0 1px 2px rgba(0,0,0,0.05)}
      .sl-btn-primary:hover{background:var(--r800)}
      .sl-btn-danger{color:var(--s500);background:var(--w);border:1px solid var(--s200);box-shadow:0 1px 2px rgba(0,0,0,0.05)}
      .sl-btn-danger:hover{color:#dc2626;background:#fef2f2;border-color:#fecaca}

      /* GAME CARDS */
      .student-ev .ev-date-col{background:var(--r50)}
      .game{background:var(--w);border:1px solid var(--s200);border-radius:1rem;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
      .game:hover{border-color:var(--s300);box-shadow:0 8px 24px rgba(0,0,0,0.05);transform:translateY(-2px)}
      .game-inner{display:flex}
      .game-date-col{width:5rem;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 0.5rem;background:var(--s50);border-right:1px solid var(--s200)}
      .game-sport{font-size:0.625rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--r700);text-align:center;line-height:1.2;margin-bottom:0.25rem}
      .game-body{flex:1;padding:1.25rem 1.5rem;min-width:0}
      .game-title{font-size:1.0625rem;font-weight:700;color:var(--s900);margin-bottom:0.375rem;line-height:1.35}
      .game-matchup{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}
      .game-opp-logo{width:1.75rem;height:1.75rem;border-radius:0.375rem;background:var(--s100);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
      .game-opp-logo img{width:100%;height:100%;object-fit:contain}
      .game-links{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.75rem}
      .game-link{display:inline-flex;align-items:center;gap:0.25rem;font-size:0.8125rem;font-weight:700;color:var(--r700);margin-top:0;transition:gap 0.2s}
      .game-link:hover{gap:0.5rem}
      @media(max-width:640px){.game-date-col{width:4rem;padding:1rem 0.25rem}.game-body{padding:1rem 1.25rem}}
      /* MOBILE NAV */
      .nav-toggle{display:none;flex-direction:column;justify-content:center;align-items:center;width:2.5rem;height:2.5rem;background:none;border:none;cursor:pointer;padding:0;z-index:60;position:relative}
      .nav-toggle span{display:block;width:1.125rem;height:1.5px;background:var(--s900,#0f172a);border-radius:1px;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);position:absolute}
      .nav-toggle span:first-child{transform:translateY(-3.5px)}
      .nav-toggle span:last-child{transform:translateY(3.5px)}
      body.nav-open .nav-toggle span:first-child{transform:rotate(45deg)}
      body.nav-open .nav-toggle span:last-child{transform:rotate(-45deg)}
      .nav-overlay{position:fixed;top:4.5rem;left:0;right:0;bottom:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:45;opacity:0;visibility:hidden;transition:opacity 0.35s cubic-bezier(0.4,0,0.2,1),visibility 0.35s}
      body.nav-open .nav-overlay{opacity:1;visibility:visible}
      .nav-mobile{max-width:72rem;margin:0 auto;padding:1rem 1.5rem;display:flex;flex-direction:column}
      .nav-mobile a{display:block;padding:0.875rem 0;font-size:1.25rem;font-weight:700;color:var(--s900,#0f172a);border-bottom:1px solid var(--s200,#e2e8f0);transition:color 0.2s;opacity:0;transform:translateY(8px);animation:none}
      body.nav-open .nav-mobile a{animation:navFade 0.3s ease forwards}
      .nav-mobile a:last-child{border-bottom:none}
      .nav-mobile a:hover{color:var(--r700,#8b0000)}
      .nav-mobile a.active{color:var(--r700,#8b0000)}
      @keyframes navFade{to{opacity:1;transform:translateY(0)}}
      body.nav-open .nav-mobile a:nth-child(1){animation-delay:0.05s}
      body.nav-open .nav-mobile a:nth-child(2){animation-delay:0.08s}
      body.nav-open .nav-mobile a:nth-child(3){animation-delay:0.11s}
      body.nav-open .nav-mobile a:nth-child(4){animation-delay:0.14s}
      body.nav-open .nav-mobile a:nth-child(5){animation-delay:0.17s}
      body.nav-open .nav-mobile a:nth-child(6){animation-delay:0.2s}
      @media(max-width:640px){.nav{display:none !important}.nav-toggle{display:flex}}
    </style>
  </head>
  <body>
    <header class="hdr"><div class="hdr-in">
      <a href="index.html" class="logo"><div class="logo-mark">B</div><div class="logo-text">Bucky Board</div></a>
            <nav class="nav">
        <a href="housing.html">Housing</a>
        <a href="marketplace.html">Marketplace</a>
        <a href="deals.html">Deals</a>
        <a href="activities.html" class="active">Activities</a>
        <a href="email.html">Email</a>
        <a href="about.html">About</a>
      </nav>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu"><span></span><span></span></button>
    </div></header>
    <div class="nav-overlay" onclick="if(event.target===this)toggleNav()"><nav class="nav-mobile">
      <a href="housing.html">Housing</a>
      <a href="marketplace.html">Marketplace</a>
      <a href="deals.html">Deals</a>
      <a href="activities.html" class="active">Activities</a>
      <a href="email.html">Email</a>
      <a href="about.html">About</a>
    </nav></div>
    <div class="page">
      <div class="content">

        <div class="pg-title">
          <h1>Activities</h1>
        </div>

        <div class="explore">
          <a href="https://uwmadison.emscloudservice.com/web/CustomBrowseEvents.aspx?data=181zlGVBkQxDDb/0JDpoUiKHPHXt4uXuoIzPpkQkgL+efUpcq8IHrTKC3+nmu0nP4jwJymNT3m/RtKM/8AUd6ziUs0RzLGLk3jkGNSXngS83x0spnF//fcmqpnnJz4DzTmu+NW/nAtFcWR3+JOsIEbHdnk8kP/aA3WAAcC7yMFU=" target="_blank" rel="noopener noreferrer" class="explore-card">
            <div class="explore-name">Today in the Union</div>
            <div class="explore-arrow">
              Explore
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </div>
          </a>
          <a id="finearts-link" href="https://artsticketing.wisc.edu/Online/default.asp" target="_blank" rel="noopener noreferrer" class="explore-card">
            <div class="explore-name">Performing Arts @ UW</div>
            <div class="explore-arrow">
              Explore
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </div>
          </a>
        </div>

        <div class="filter-bar-wrap">
          <div class="filter-bar" id="filter-bar">
            <button class="src-tab active" data-src="all" onclick="filterSource('all',this)">
              <span class="src-tab-label">All</span>
            </button>
            <button class="src-tab" data-src="student" onclick="filterSource('student',this)">
              <span class="src-tab-label">Student Events</span>
              <span class="src-tab-sub">buckyboard.org</span>
            </button>
            <button class="src-tab" data-src="sports" onclick="filterSource('sports',this)">
              <span class="src-tab-label">Home Games</span>
              <span class="src-tab-sub">uwbadgers.com</span>
            </button>
            <button class="src-tab" data-src="music" onclick="filterSource('music',this)">
              <span class="src-tab-label">Music</span>
              <span class="src-tab-sub">music.wisc.edu</span>
            </button>
            <button class="src-tab" data-src="wisc" onclick="filterSource('wisc',this)">
              <span class="src-tab-label">Events</span>
              <span class="src-tab-sub">today.wisc.edu</span>
            </button>
          </div>
        </div>

        <div class="sl-actions">
          <button id="sl-refresh-btn" class="sl-btn sl-btn-outline" onclick="softRefresh()">
            <span id="sl-refresh-icon" style="display:inline-flex"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg></span>
            <span>Refresh</span>
          </button>
          <button class="sl-btn sl-btn-primary" onclick="openF('add')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            <span>Add Listing</span>
          </button>
          <button class="sl-btn sl-btn-danger" onclick="openF('delete')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            <span>Delete Listing</span>
          </button>

    function parseICSDate(raw){
      if(!raw)return null;
      var digits=(raw.match(/\d+/g)||[]).join('');
      if(digits.length<8)return null;
      var y=parseInt(digits.slice(0,4)),m=parseInt(digits.slice(4,6))-1,d=parseInt(digits.slice(6,8));
      var hh=digits.length>=10?parseInt(digits.slice(8,10)):0;
      var mm=digits.length>=12?parseInt(digits.slice(10,12)):0;
      return new Date(y,m,d,hh,mm);
    }

    function getField(block,field){
      var regex=new RegExp(field+'(?:;[^:]*)?:(.*)');
      var match=block.match(regex);
      return match?match[1].trim():'';
    }

    function formatTime(dt){
      if(!dt)return'';
      var h=dt.getHours(),m=dt.getMinutes();
      if(h===0&&m===0)return'';
      var ampm=h>=12?'PM':'AM';
      h=h%12||12;
      return h+':'+(m<10?'0':'')+m+' '+ampm;
    }

    function parseTimeStr(timeStr){
      // Parse time strings: "7:00 PM", "7:00 p.m. CT", "7 PM", "19:00", "7:00PM"
      if(!timeStr)return null;
      var s=timeStr.trim();
      // Try "H:MM AM/PM" or "H:MM a.m./p.m." with optional extras
      var match=s.match(/(\d{1,2}):(\d{2})\s*(AM|PM|a\.m\.|p\.m\.)/i);
      if(match){
        var h=parseInt(match[1]),m=parseInt(match[2]),ampm=match[3].toLowerCase().replace(/\./g,'');
        if(ampm==='pm'&&h!==12)h+=12;
        if(ampm==='am'&&h===12)h=0;
        return{hours:h,minutes:m};
      }
      // Try "H AM/PM" or "H a.m./p.m." (no minutes)
      match=s.match(/(\d{1,2})\s*(AM|PM|a\.m\.|p\.m\.)/i);
      if(match){
        var h=parseInt(match[1]),ampm=match[2].toLowerCase().replace(/\./g,'');
        if(ampm==='pm'&&h!==12)h+=12;
        if(ampm==='am'&&h===12)h=0;
        return{hours:h,minutes:0};
      }
      // Try 24h "HH:MM"
      match=s.match(/^(\d{1,2}):(\d{2})$/);
      if(match){
        var h=parseInt(match[1]),m=parseInt(match[2]);
        if(h>=0&&h<=23)return{hours:h,minutes:m};
      }
      return null;
    }

    function parseICSBlock(block){
      var title=getField(block,'SUMMARY')||'Untitled Event';

      var end=parseICSDate(getField(block,'DTEND'));
      if(!start)return null;
      var loc=getField(block,'LOCATION').replace(/\\\\/g,'').replace(/\\,/g,',').replace(/\\n/g,' ');
      var desc=getField(block,'DESCRIPTION').replace(/\\n/g,' ').replace(/\\\\/g,'').replace(/\\,/g,',');
      var cat=getField(block,'CATEGORIES');
      var uid=getField(block,'UID');
      return{title:title,start:start,end:end,location:loc,desc:desc,url:getField(block,'URL'),category:cat,uid:uid};
    }

    /* ===== CSV PARSER ===== */
    function parseCSV(t){
      var a=[];var q=false,r=0,c=0;
      t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      a[0]=[''];
      for(var i=0;i<t.length;i++){
        var ch=t[i],nx=t[i+1];
        a[r]=a[r]||[];a[r][c]=a[r][c]||'';
        if(ch==='"'&&q&&nx==='"'){a[r][c]+='"';i++;continue}
        if(ch==='"'){q=!q;continue}
        if(ch===','&&!q){c++;a[r][c]='';continue}
        if(ch==='\n'&&!q){r++;c=0;a[r]=[''];continue}
        a[r][c]+=ch;
      }
      var d=a.filter(function(r){return r.length>0&&(r.length>1||r[0].trim()!=='')});
      if(!d.length)return{headers:[],rows:[]};
      var h=d[0].map(function(s){return s.trim()});
      var rows=[];
      for(var i=1;i<d.length;i++){
        var cur=d[i],o={};
        h.forEach(function(hd,idx){
          var v=cur[idx];
          if(v===undefined||v==='')o[hd]=null;
          else o[hd]=v.trim();
        });
        rows.push(o);
      }
      return{headers:h,rows:rows};
    }

        if(!inserted)evList.insertAdjacentHTML('beforeend',cardHtml);
        // Apply active filter to the newly inserted element
        if(activeFilter!=='all'){
          var newEl=evList.querySelector('[data-ts="'+ts+'"]:not([data-filtered])');
          // Mark and hide all elements not matching filter
          var all=evList.querySelectorAll('.ev, .game');
          all.forEach(function(el){
            if(activeFilter!=='all'&&el.getAttribute('data-source')!==activeFilter){
              el.style.display='none';
            }
          });
        }
      }

      // 1. Fetch athletics (JSON, fast) in parallel
      var d1=dateStr(now);
      var w2=new Date(now.getTime()+7*86400000);
      var w3=new Date(now.getTime()+14*86400000);
      var athUrls=[
        'https://uwbadgers.com/api/v2/Calendar/events?date='+d1,
        'https://uwbadgers.com/api/v2/Calendar/events?date='+dateStr(w2),
        'https://uwbadgers.com/api/v2/Calendar/events?date='+dateStr(w3)
      ];
      var athSeen={};
      var athPromise=Promise.all(athUrls.map(function(url){
        return fetchProxy(url)
          .then(function(r){return r.json()})
          .then(function(days){
            days.forEach(function(day){
              if(!day.events)return;
              var dt=new Date(day.date);
              day.events.forEach(function(ev){
                if(!ev.location||ev.location.indexOf('Madison')===-1)return;
                if(athSeen[ev.id])return;
                athSeen[ev.id]=true;
                // Parse the time string to get a proper timestamp for sorting
                var ts=dt.getTime();
                var parsed=parseTimeStr(ev.time);
                if(parsed){
                  ts=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate(),parsed.hours,parsed.minutes).getTime();
                }
                insertSorted(renderGameCard(ev,dt,ts),ts);
              });
            });
          }).catch(function(){});
      }));

      // 2. Fetch music events (ICS, current + next month)
      var musicSeen={};
      var musicMonth1='https://music.wisc.edu/events/month/?ical=1';
      var nextMonth=new Date(now.getFullYear(),now.getMonth()+1,1);
      var musicMonth2='https://music.wisc.edu/events/month/'+nextMonth.getFullYear()+'-'+pad(nextMonth.getMonth()+1)+'/?ical=1';
      Promise.all([musicMonth1,musicMonth2].map(function(url){
        return fetchProxied(url)
          .then(function(r){return r.text()})
          .then(function(raw){
            raw=raw.replace(/\r?\n[ \t]/g,'');
            var blocks=raw.split('BEGIN:VEVENT').slice(1);
            var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
            blocks.forEach(function(b){
              var ev=parseICSBlock(b);
              if(!ev||!ev.start)return;
              if(ev.start<today)return;
              var key='music|'+ev.title+'|'+ev.start.getTime();
              if(musicSeen[key])return;
              musicSeen[key]=true;
              insertSorted(renderMusicCard(ev),ev.start.getTime());
            });
          }).catch(function(){});
      }));

      // 3. Fetch student events from Google Sheet
      (function(){
        var sheetId='1iITqjjqjmRiQ4nyJeK8-7Ryx68taW7j4J-dI6JmK3iI';
        var csvUrl='https://docs.google.com/spreadsheets/d/'+sheetId+'/export?format=csv&gid=0';
        var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
        fetch(csvUrl)
          .then(function(r){return r.text()})
          .then(function(csv){
            var parsed=parseCSV(csv);
            if(!parsed.rows.length)return;
            parsed.rows.forEach(function(row){
              if(!row['Date'])return;
              var result=renderStudentCard(row);
              if(!result)return;
              // Only show events from today onward
              var evDate=new Date(row['Date']);
              if(isNaN(evDate.getTime()))return;
              if(evDate<today&&result.ts<today.getTime())return;
              var key='student|'+(row['Title']||'')+'|'+result.ts;
              if(seen[key])return;
              seen[key]=true;
              insertSorted(result.html,result.ts);
            });
          }).catch(function(e){console.log('Student events error:',e)});
      })();

      // 4. Fetch campus events — one request per day for 21 days, paginating if needed
      function processCampusDay(events, filterPast){
        if(!Array.isArray(events))return;
        events.forEach(function(ev){
          if(!ev.startDate)return;
          var start=new Date(ev.startDate);
          var end=ev.endDate?new Date(ev.endDate):null;
          if(filterPast&&end&&end<now)return;
          var loc=(ev.location||'').trim();
          if(!loc)return;
          var ll=loc.toLowerCase();
          if(ll.includes('virtual')||ll.includes('online')||ll.includes('zoom')||ll.includes('webinar')||ll.includes('teams meeting'))return;
          var mapped={
            title:ev.title||'Untitled Event',
            start:start,end:end,location:loc,
            desc:(ev.description||'').replace(/<[^>]+>/g,'').trim(),
            url:ev.url||'',uid:String(ev.id||'')
          };
          hasItems=true;
          insertSorted(renderCampusCard(mapped),start.getTime());
        });
      }

      function fetchDayAllPages(day, filterPast){
        function fetchPage(page){
          var url='https://today.wisc.edu/events/day/'+day+'.json?page='+page;
          return fetch(url)
            .then(function(r){return r.json();})
            .then(function(events){
              if(!Array.isArray(events)||events.length===0)return;
              processCampusDay(events, filterPast);
              // If a full page came back, there may be more
              if(events.length>=40)return fetchPage(page+1);
            });
        }
        return fetchPage(1).catch(function(){});
      }

      var dayPromises=[];
      for(var di=0;di<21;di++){
        var d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+di);
        dayPromises.push(fetchDayAllPages(dateStr(d), di===0));
      }

      var campusPromise=Promise.all(dayPromises);

      Promise.all([athPromise,campusPromise]).then(function(){
        var sp=container.querySelector('.events-loading');
        if(sp)sp.remove();
        slIsLoading=false;
        setSlRefreshState(false);
        if(!hasItems){
          container.innerHTML='<div class="events-error"><p>No upcoming events found.</p><a href="https://today.wisc.edu/events" target="_blank" rel="noopener noreferrer">View on today.wisc.edu &rarr;</a></div>';
        }
      });
    }

    // Initial load
    loadEvents();

    // Click to expand/collapse truncated descriptions
    document.getElementById('events-container').addEventListener('click',function(e){
      var card=e.target.closest('.ev, .game');
      if(!card)return;
      // Don't expand if clicking a link
      if(e.target.closest('a'))return;
      var desc=card.querySelector('.ev-desc');
      if(!desc)return;
      // Check if text is actually truncated
      if(!desc.classList.contains('expanded')&&desc.scrollHeight<=desc.clientHeight+2)return;
      desc.classList.toggle('expanded');
    });
    </script>
  
    <script>
    function toggleNav(){document.body.classList.toggle('nav-open')}
    document.querySelectorAll('.nav-overlay a').forEach(function(a){a.addEventListener('click',function(){document.body.classList.remove('nav-open')})});
    </script>
  </body>
